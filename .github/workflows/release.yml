name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Run tests
        run: go test ./...

      - name: Check git state
        run: |
          git status
          git diff

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          install-only: true

      - name: Run GoReleaser
        id: goreleaser
        run: |
          set -o pipefail
          goreleaser release --clean --verbose 2>&1 | tee /tmp/goreleaser.log
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload debug log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: goreleaser-log
          path: /tmp/goreleaser.log
